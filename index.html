<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>autorun.dev</title>
<meta name="description" content="autorun.dev — ai-native tools for messaging, gaming, and trading">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0a0a;
    --fg:#c8c8c8;
    --dim:#555;
    --accent:#6ee7b7;
    --link:#93c5fd;
    --prompt:#a78bfa;
  }
  html{font-size:clamp(8px,calc((100vw - 32px)/36),15px)}
  body{
    background:var(--bg);
    color:var(--fg);
    font-family:'SF Mono','Cascadia Code','JetBrains Mono','Fira Code',monospace;
    line-height:1.7;
    min-height:100dvh;
    display:flex;
    justify-content:center;
    padding:2rem 16px;
    -webkit-font-smoothing:antialiased;
  }
  .terminal{
    max-width:640px;
    width:100%;
    overflow-x:hidden;
  }
  .line{margin-bottom:.15rem}
  .prompt::before{
    content:'>';
    color:var(--prompt);
    margin-right:.6em;
  }
  .cmd{color:#fff;font-weight:600}
  .dim{color:var(--dim)}
  .accent{color:var(--accent)}
  .blank{height:1.7em}

  /* intro */
  .intro{margin-bottom:0;white-space:pre;line-height:1.2}
  .intro .accent{color:var(--accent)}

  /* projects */
  .project{
    display:block;
    margin:.6rem 0 .6rem 1.2rem;
    text-decoration:none;
    color:var(--fg);
    border-left:2px solid var(--dim);
    padding-left:1rem;
    transition:border-color .2s,color .2s;
  }
  .project:hover{
    border-color:var(--accent);
  }
  .project-name{
    color:var(--link);
    font-weight:600;
  }
  .project:hover .project-name{
    text-decoration:underline;
    text-underline-offset:3px;
  }
  .project-desc{
    color:var(--dim);
    font-size:.87rem;
  }

  /* interactive input */
  .input-line{display:flex;align-items:center}
  .input-line::before{
    content:'>';
    color:var(--prompt);
    flex-shrink:0;
    margin-right:.6em;
  }
  .input-wrap{
    display:flex;
    align-items:center;
    min-width:0;
  }
  #input{
    background:none;
    border:none;
    color:#fff;
    font:inherit;
    font-weight:600;
    outline:none;
    caret-color:transparent;
    white-space:nowrap;
    overflow:hidden;
  }
  #input br{display:none}

  /* block cursor */
  .cursor{
    display:inline-block;
    width:.6em;
    height:1.15em;
    background:var(--fg);
    vertical-align:text-bottom;
    animation:blink 1s step-end infinite;
    flex-shrink:0;
  }
  @keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
<div class="terminal" id="term">

  <div class="intro"><span class="accent">           _                          _         </span></div>
  <div class="intro"><span class="accent"> __ _ _  _| |_ ___ _ _ _  _ _ _    __| |_____ __</span></div>
  <div class="intro"><span class="accent">/ _` | || |  _/ _ \ '_| || | ' \ _/ _` / -_) V /</span></div>
  <div class="intro"><span class="accent">\__,_|\_,_|\__\___/_|  \_,_|_||_(_)__,_\___|\_/ </span></div>
  <div class="blank"></div>
  <div class="line dim">v1.0.0 — ai-native tools for messaging, gaming, and trading.</div>
  <div class="blank"></div>
  <div class="line dim">Type <span style="color:var(--fg)">help</span> to see available commands.</div>
  <div class="blank"></div>

  <div class="input-line">
    <div class="input-wrap">
      <div id="input" contenteditable="true" role="textbox" spellcheck="false" autocorrect="off" autocapitalize="off"></div><span class="cursor" id="cursor"></span>
    </div>
  </div>

</div>

<script>
  const term = document.getElementById('term');
  const input = document.getElementById('input');
  const inputLine = input.closest('.input-line');

  const commands = {
    help:     () => '<span class="dim">about</span>     — what we do\n<span class="dim">projects</span>  — things we build\n<span class="dim">team</span>     — who we are\n<span class="dim">links</span>    — find us online\n<span class="dim">clear</span>    — reset terminal',
    about:    () => 'we build ai-native products that live where\npeople already spend their time — messengers,\ngames, markets. small team, fast shipping.',
    team:     () => 'founded by <span style="color:var(--fg)">anton afrolov</span>.\nproduct engineer. builds from zero to one.\n<span class="dim">previously:</span> product, growth, startups.',
    projects: () => '__projects__',
    links:    () => '<a href="https://github.com/autorunmd" target="_blank" style="color:var(--link);text-decoration:none">github</a> <span class="dim">·</span> <a href="https://t.me/autorun" target="_blank" style="color:var(--link);text-decoration:none">telegram</a>',
    clear:    () => '__clear__',
  };

  const projectsHTML = `
    <a href="https://vectoros.ai" target="_blank" rel="noopener" class="project">
      <div class="project-name">vectoros.ai</div>
      <div class="project-desc">AI companion for Telegram — second brain powered by Claude</div>
    </a>
    <a href="https://t.me/playsnap_bot/app" target="_blank" rel="noopener" class="project">
      <div class="project-name">playsnap.bot</div>
      <div class="project-desc">Minimalist hockey for Telegram — one-button, perfect timing</div>
    </a>`;

  // prevent paste formatting, line breaks
  input.addEventListener('paste', e => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text/plain').replace(/\n/g,'');
    document.execCommand('insertText', false, text);
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const val = input.textContent.trim().toLowerCase();
      input.textContent = '';
      if (!val) return;

      const cmdLine = document.createElement('div');
      cmdLine.className = 'line';
      cmdLine.innerHTML = `<span class="prompt"></span><span class="cmd">${esc(val)}</span>`;
      term.insertBefore(cmdLine, inputLine);

      if (val === 'clear') {
        while (term.firstChild !== inputLine) term.removeChild(term.firstChild);
        return;
      }

      const handler = commands[val];
      if (handler) {
        const result = handler();
        if (result === '__projects__') {
          const wrap = document.createElement('div');
          wrap.innerHTML = projectsHTML;
          term.insertBefore(wrap, inputLine);
        } else {
          result.split('\n').forEach(l => {
            const out = document.createElement('div');
            out.className = 'line';
            out.innerHTML = l;
            term.insertBefore(out, inputLine);
          });
        }
      } else {
        const out = document.createElement('div');
        out.className = 'line dim';
        out.textContent = `command not found: ${val}. try "help"`;
        term.insertBefore(out, inputLine);
      }

      const blank = document.createElement('div');
      blank.className = 'blank';
      term.insertBefore(blank, inputLine);

      window.scrollTo(0, document.body.scrollHeight);
    }
  });

  document.addEventListener('click', () => input.focus());
  requestAnimationFrame(() => input.focus());

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
</script>
</body>
</html>
