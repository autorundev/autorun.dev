<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>[*] autorun.dev</title>
<link rel="icon" href="/favicon.ico" sizes="16x16 32x32 48x48">
<link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32">
<meta name="description" content="autorun.dev - ai-native tools & products">
<meta property="og:title" content="[*] autorun.dev">
<meta property="og:description" content="ai-native tools & products">
<meta property="og:image" content="https://autorun.dev/og.png">
<meta property="og:url" content="https://autorun.dev">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="[*] autorun.dev">
<meta name="twitter:description" content="ai-native tools & products">
<meta name="twitter:image" content="https://autorun.dev/og.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  /* === DARK THEME (default) === */
  :root{
    --bg:#0A0A0A;
    --bg-1:#111111;
    --fg:#E8E8E8;
    --fg-1:#A0A0A0;
    --fg-2:#606060;
    --fg-3:#404040;
    --core:#7DD3FC;
    --action:#E8E8E8;
    --presence:#A78BFA;
    --live:#4ADE80;
    --alert:#FBBF24;
    --stop:#F87171;
    --stealth:#A0A0A0;
  }

  /* === LIGHT THEME === */
  [data-theme="light"]{
    --bg:#FAFAFA;
    --bg-1:#F4F4F4;
    --fg:#0A0A0A;
    --fg-1:#404040;
    --fg-2:#707070;
    --fg-3:#B0B0B0;
    --core:#0284C7;
    --action:#0A0A0A;
    --presence:#7C3AED;
    --live:#16A34A;
    --alert:#D97706;
    --stop:#DC2626;
    --stealth:#707070;
  }

  /* === SYSTEM THEME === */
  @media(prefers-color-scheme:light){
    [data-theme="system"]{
      --bg:#FAFAFA;
      --bg-1:#F4F4F4;
      --fg:#0A0A0A;
      --fg-1:#404040;
      --fg-2:#707070;
      --fg-3:#B0B0B0;
      --core:#0284C7;
      --action:#0A0A0A;
      --presence:#7C3AED;
      --live:#16A34A;
      --alert:#D97706;
      --stop:#DC2626;
      --stealth:#707070;
    }
  }

  html{font-size:14px}
  body{
    background:var(--bg);
    color:var(--fg);
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:14px;
    line-height:18px;
    letter-spacing:0;
    font-variant-ligatures:none;
    font-feature-settings:'liga' 0,'calt' 0;
    min-height:100dvh;
    display:flex;
    justify-content:center;
    padding:2rem 16px;
    -webkit-font-smoothing:antialiased;
    transition:background .3s ease-out,color .3s ease-out;
  }
  .terminal{
    max-width:640px;
    width:100%;
    overflow-x:hidden;
  }
  .line{margin-bottom:.15rem}
  .cmd{color:var(--fg);font-weight:500}
  .dim{color:var(--fg-2)}
  .blank{height:18px}

  /* state marks */
  .st{font-weight:500;display:inline;}
  .st-core{color:var(--core)}
  .st-action{color:var(--action)}
  .st-presence{color:var(--presence)}
  .st-live{color:var(--live)}
  .st-alert{color:var(--alert)}
  .st-stop{color:var(--stop)}
  .st-stealth{color:var(--stealth)}
  .st-idle{color:var(--fg-2)}

  /* logo */
  .logo-wrap{cursor:pointer;display:inline-block}
  .logo-mark{
    font-weight:800;
    display:flex;
    align-items:center;
    gap:.4em;
  }
  .logo-mark .mark-char{
    color:var(--core);
    transition:color .1s;
  }

  /* projects */
  .project{
    display:block;
    margin:.5rem 0 .5rem 0;
    text-decoration:none;
    color:var(--fg);
    border-left:2px solid var(--fg-3);
    padding-left:1rem;
    transition:border-color .2s;
  }
  .project:hover{border-color:var(--core)}
  .project-name{color:var(--core);font-weight:800}
  .project-desc{color:var(--fg-2)}
  .project-status{}

  /* interactive input */
  .input-line{display:flex;align-items:center}
  .input-line::before{
    content:'[>]';
    color:var(--action);
    flex-shrink:0;
    margin-right:.6em;
  }
  .input-wrap{display:flex;align-items:center;min-width:0}
  #input{
    background:none;
    border:none;
    color:var(--fg);
    font:inherit;
    font-weight:500;
    outline:none;
    caret-color:transparent;
    white-space:nowrap;
    padding:0;margin:0;
    min-height:18px;
    -webkit-user-modify:read-write-plaintext-only;
  }
  #input br{display:none}

  /* block cursor */
  .cursor{
    display:inline-block;
    width:8px;height:18px;
    background:var(--fg);
    vertical-align:baseline;
    animation:blink 1s step-end infinite;
    flex-shrink:0;
  }
  @keyframes blink{50%{opacity:0}}

  /* processing spinner */
  .processing{color:var(--core);margin-bottom:.15rem}

  /* reduced motion */
  @media(prefers-reduced-motion:reduce){
    .cursor{animation:none}
  }
</style>
</head>
<body>
<div class="terminal" id="term">

  <div class="logo-wrap" id="logo">
    <div class="logo-mark"><span class="mark-char" id="mark">[*]</span>autorun.dev</div>
  </div>
  <div class="line dim">ai-native tools &amp; products</div>
  <div class="line dim">v0.1.0</div>
  <div class="blank"></div>
  <div class="line"><span class="st st-action">[>]</span> <span class="dim">booting autorun.dev ...</span> <span class="st st-live">ok</span></div>
  <div class="line"><span class="st st-action">[>]</span> <span class="dim">agents online:</span> 3</div>
  <div class="line"><span class="st st-action">[>]</span> <span class="dim">type</span> <span class="cmd">help</span> <span class="dim">to see available commands.</span></div>
  <div class="blank"></div>

  <div class="input-line">
    <div class="input-wrap">
      <div id="input" contenteditable="true" role="textbox" spellcheck="false" autocorrect="off" autocapitalize="off"></div><span class="cursor" id="cursor"></span>
    </div>
  </div>

</div>

<script>
const term = document.getElementById('term');
const input = document.getElementById('input');
const inputLine = input.closest('.input-line');
const markEl = document.getElementById('mark');
const logoEl = document.getElementById('logo');

// ── state mark animation ──────────────────────────
const RUNTIME_LOOP = ['[*]','[/]','[-]','[\\]'];
const RUNTIME_COLORS = ['st-core','st-core','st-idle','st-core'];
let logoAnimating = false;

function animateMark(sequence, colors, stepMs, onDone) {
  if (logoAnimating) return;
  logoAnimating = true;
  let i = 0;
  function step() {
    if (i >= sequence.length) {
      markEl.textContent = '[*]';
      markEl.className = 'mark-char st-core';
      logoAnimating = false;
      if (onDone) onDone();
      return;
    }
    markEl.textContent = sequence[i];
    markEl.className = 'mark-char ' + (colors[i] || 'st-core');
    i++;
    setTimeout(step, stepMs);
  }
  step();
}

// periodic idle breath: every 8-15s
function scheduleBreath() {
  const delay = 8000 + Math.random() * 7000;
  setTimeout(() => {
    if (!logoAnimating) {
      animateMark(
        ['[.]','[:]','[_]','[*]'],
        ['st-idle','st-presence','st-idle','st-core'],
        800,
        scheduleBreath
      );
    } else {
      scheduleBreath();
    }
  }, delay);
}
scheduleBreath();

// hover/tap triggers runtime loop
logoEl.addEventListener('mouseenter', () => {
  animateMark(RUNTIME_LOOP, RUNTIME_COLORS, 200);
});
logoEl.addEventListener('click', e => {
  if (e.target.closest('.input-line')) return;
  animateMark(RUNTIME_LOOP, RUNTIME_COLORS, 150);
});

// ── processing spinner on [>] ─────────────────────
function showProcessing(cmdLineEl) {
  return new Promise(resolve => {
    inputLine.style.display = 'none';
    const mark = cmdLineEl.querySelector('.st');
    const frames = ['[/]','[-]','[\\]','[-]','[>]'];
    let i = 0;
    mark.classList.remove('st-action');
    mark.classList.add('st-core');
    const iv = setInterval(() => {
      if (i >= frames.length) {
        clearInterval(iv);
        mark.textContent = '[>]';
        mark.classList.remove('st-core');
        mark.classList.add('st-action');
        inputLine.style.display = '';
        resolve();
        return;
      }
      mark.textContent = frames[i];
      i++;
    }, 120);
  });
}

// ── theme system ──────────────────────────────────
function getTheme() {
  return localStorage.getItem('autorun-theme') || 'system';
}
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('autorun-theme', t);
}
applyTheme(getTheme());

// ── commands ──────────────────────────────────────
const commands = {
  help: () =>
    'about    <span style="color:var(--fg-3)"> - what we do</span>\n' +
    'projects <span style="color:var(--fg-3)"> - things we ship</span>\n' +
    'team     <span style="color:var(--fg-3)"> - who\'s behind the terminal</span>\n' +
    'stack    <span style="color:var(--fg-3)"> - how we build</span>\n' +
    'config   <span style="color:var(--fg-3)"> - settings</span>\n' +
    'clear    <span style="color:var(--fg-3)"> - wipe the screen</span>',

  about: () =>
    'autorun.dev builds ai-native products that\n' +
    'run where people already live - messengers,\n' +
    'games, markets. small crew. tight loops.\n' +
    'no meetings that could\'ve been a commit.\n' +
    '\n' +
    '<span class="dim">thesis: the best software in 2026 doesn\'t</span>\n' +
    '<span class="dim">have a ui. it has an agent.</span>',

  team: () =>
    'small, senior, remote. product engineers\n' +
    'who ship end-to-end - design, code, growth,\n' +
    'ops.\n' +
    '\n' +
    'founder:  <span style="color:var(--fg)">anton frolov</span>\n' +
    '          vibe coder (unironically)\n' +
    '\n' +
    'crew:     engineers, designers, degens\n' +
    'hiring:   always, if you\'re the real thing.\n' +
    '          → <a href="mailto:hello@autorun.dev" style="color:var(--core);text-decoration:none">hello@autorun.dev</a>',

  projects: () => '__projects__',

  stack: () =>
    'claude · typescript · python · telegram\n' +
    'sqlite-and-prayers · vps · tmux · vibes\n' +
    '<span class="dim">we deploy on fridays.</span>',

  config: (args) => {
    if (!args) {
      return '<span class="dim">current theme:</span> ' + getTheme() + '\n' +
        '\n' +
        '<span class="dim">usage:</span>\n' +
        '  config theme dark\n' +
        '  config theme light\n' +
        '  config theme system';
    }
    const parts = args.split(/\s+/);
    if (parts[0] === 'theme' && ['dark','light','system'].includes(parts[1])) {
      applyTheme(parts[1]);
      return '<span class="st st-live">[+]</span> theme set to <span style="color:var(--fg)">' + parts[1] + '</span>';
    }
    return '<span class="st st-alert">[?]</span> <span class="dim">unknown config. try:</span> config theme dark|light|system';
  },

  clear: () => '__clear__',
};

const projectsHTML = `
  <a href="https://vectoros.ai" target="_blank" rel="noopener" class="project">
    <div class="project-name">vectoros.ai →</div>
    <div class="project-desc">ai companion for telegram.<br>second brain powered by claude.</div>
    <div class="project-status st-live">[status: live]</div>
  </a>
  <a href="https://t.me/playsnap_bot/app" target="_blank" rel="noopener" class="project">
    <div class="project-name">playsnap.bot →</div>
    <div class="project-desc">minimalist hockey for telegram.<br>one button. perfect timing. no tutorial.</div>
    <div class="project-status st-live">[status: live]</div>
  </a>
  <div class="project" style="cursor:default">
    <div class="project-name st-stealth">[redacted]</div>
    <div class="project-desc">something for traders.</div>
    <div class="project-status st-stealth">[status: stealth]</div>
  </div>`;

// ── input handling ────────────────────────────────
input.addEventListener('paste', e => {
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData('text/plain').replace(/\n/g,'');
  document.execCommand('insertText', false, text);
});

let processing = false;

input.addEventListener('keydown', async e => {
  if (e.key !== 'Enter' || processing) return;
  e.preventDefault();
  const raw = input.textContent.trim();
  const val = raw.toLowerCase();
  input.textContent = '';
  if (!val) return;

  // echo command
  const cmdLine = document.createElement('div');
  cmdLine.className = 'line';
  cmdLine.innerHTML = `<span class="st st-action">[>]</span> <span class="cmd">${esc(raw)}</span>`;
  term.insertBefore(cmdLine, inputLine);

  if (val === 'clear') {
    while (term.firstChild !== inputLine) term.removeChild(term.firstChild);
    return;
  }

  // spinner inline with command
  processing = true;
  await showProcessing(cmdLine);
  processing = false;

  // parse command + args
  const spaceIdx = val.indexOf(' ');
  const cmd = spaceIdx > -1 ? val.slice(0, spaceIdx) : val;
  const args = spaceIdx > -1 ? val.slice(spaceIdx + 1).trim() : '';

  const handler = commands[cmd];
  if (handler) {
    const result = handler(args || undefined);
    if (result === '__projects__') {
      const wrap = document.createElement('div');
      wrap.innerHTML = projectsHTML;
      term.insertBefore(wrap, inputLine);
    } else {
      result.split('\n').forEach(l => {
        const out = document.createElement('div');
        out.className = 'line';
        out.innerHTML = l;
        term.insertBefore(out, inputLine);
      });
    }
  } else {
    const out = document.createElement('div');
    out.className = 'line';
    out.innerHTML = `<span class="st st-alert">[?]</span> <span class="dim">command not found: ${esc(val)}. try</span> <span class="cmd">help</span>`;
    term.insertBefore(out, inputLine);
  }

  const blank = document.createElement('div');
  blank.className = 'blank';
  term.insertBefore(blank, inputLine);

  inputLine.scrollIntoView({block:'nearest'});
});

// ── focus management ──────────────────────────────
function focusEnd() {
  input.focus();
  const sel = window.getSelection();
  sel.selectAllChildren(input);
  sel.collapseToEnd();
}

document.addEventListener('click', e => {
  if (!input.contains(e.target) && !e.target.closest('a')) focusEnd();
});
requestAnimationFrame(focusEnd);

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
