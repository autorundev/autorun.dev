<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>autorun.dev</title>
<link rel="icon" href="/favicon.ico" sizes="16x16 32x32 48x48">
<link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32">
<meta name="description" content="autorun.dev - ai-native tools & products">
<meta property="og:title" content="autorun.dev">
<meta property="og:description" content="ai-native tools & products">
<meta property="og:image" content="https://autorun.dev/og.png">
<meta property="og:url" content="https://autorun.dev">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="autorun.dev">
<meta name="twitter:description" content="ai-native tools & products">
<meta name="twitter:image" content="https://autorun.dev/og.png">
<style>
  @font-face{
    font-family:'JetBrains Mono';
    src:url('/fonts/JetBrainsMono-Medium.woff2') format('woff2');
    font-weight:500;
    font-style:normal;
    font-display:swap;
  }
  @font-face{
    font-family:'JetBrains Mono';
    src:url('/fonts/JetBrainsMono-ExtraBold.woff2') format('woff2');
    font-weight:800;
    font-style:normal;
    font-display:swap;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  /* === DARK THEME === */
  :root,
  [data-theme="dark"]{
    --bg-0:#0A0A0A;
    --bg-1:#111111;
    --bg-2:#1A1A1A;
    --fg-0:#E8E8E8;
    --fg-1:#A0A0A0;
    --fg-2:#606060;
    --fg-3:#404040;
    --state-core:#7DD3FC;
    --state-action:#E8E8E8;
    --state-presence:#A78BFA;
    --state-live:#4ADE80;
    --state-alert:#FBBF24;
    --state-stop:#F87171;
    --state-stealth:#A0A0A0;
    --brand-autorun:#7DD3FC;
    --brand-vectoros:#FFFFFF;
    --brand-playsnap-play:#FFFFFF;
    --brand-playsnap-snap:#C8FF00;
  }

  /* === LIGHT THEME === */
  [data-theme="light"]{
    --bg-0:#FAFAFA;
    --bg-1:#F4F4F4;
    --bg-2:#EDEDED;
    --fg-0:#0A0A0A;
    --fg-1:#404040;
    --fg-2:#707070;
    --fg-3:#B0B0B0;
    --state-core:#0284C7;
    --state-action:#0A0A0A;
    --state-presence:#7C3AED;
    --state-live:#16A34A;
    --state-alert:#D97706;
    --state-stop:#DC2626;
    --state-stealth:#707070;
    --brand-autorun:#0284C7;
    --brand-vectoros:#0A0A0A;
    --brand-playsnap-play:#0A0A0A;
    --brand-playsnap-snap:#65A30D;
  }

  /* === SYSTEM THEME === */
  @media(prefers-color-scheme:light){
    [data-theme="system"]{
      --bg-0:#FAFAFA;
      --bg-1:#F4F4F4;
      --bg-2:#EDEDED;
      --fg-0:#0A0A0A;
      --fg-1:#404040;
      --fg-2:#707070;
      --fg-3:#B0B0B0;
      --state-core:#0284C7;
      --state-action:#0A0A0A;
      --state-presence:#7C3AED;
      --state-live:#16A34A;
      --state-alert:#D97706;
      --state-stop:#DC2626;
      --state-stealth:#707070;
      --brand-autorun:#0284C7;
      --brand-vectoros:#0A0A0A;
      --brand-playsnap-play:#0A0A0A;
      --brand-playsnap-snap:#65A30D;
    }
  }

  html{--lh:18px;font-size:14px}
  body{
    background:var(--bg-0);
    color:var(--fg-0);
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:14px;
    line-height:var(--lh);
    letter-spacing:0;
    font-variant-ligatures:none;
    font-feature-settings:'liga' 0,'calt' 0;
    min-height:100dvh;
    margin:0;
    padding:calc(var(--lh)*2) max(1ch,4vw);
    -webkit-font-smoothing:antialiased;
    transition:background .3s ease-out,color .3s ease-out;
  }
  .terminal{
    max-width:60ch;
    width:100%;
    margin:0 auto;
  }
  @media(min-width:640px){
    .terminal{max-width:80ch}
  }
  .line{white-space:pre-wrap;overflow-wrap:anywhere;padding-left:4ch;text-indent:-4ch}
  .cmd{color:var(--fg-0);font-weight:500}
  .dim{color:var(--fg-2)}
  .blank{height:var(--lh)}

  /* state marks */
  .st{font-weight:500;display:inline;}
  .st-core{color:var(--state-core)}
  .st-action{color:var(--state-action)}
  .st-presence{color:var(--state-presence)}
  .st-live{color:var(--state-live)}
  .st-alert{color:var(--state-alert)}
  .st-stop{color:var(--state-stop)}
  .st-stealth{color:var(--state-stealth)}
  .st-idle{color:var(--fg-2)}

  /* logo */
  .logo-wrap{cursor:pointer;display:inline-block;font-weight:800;white-space:pre-wrap}
  .logo-wrap .mark-char{
    color:var(--state-core);
    transition:color .1s;
  }


  /* project links */
  .proj-link{display:block;text-decoration:none;color:inherit;cursor:pointer}
  .proj-arrow{color:var(--fg-0);opacity:0;transition:opacity .15s}
  .proj-link:hover .proj-arrow{opacity:1}

  /* interactive input */
  .input-line{display:flex;align-items:flex-start}
  .input-line::before{
    content:'[>]';
    color:var(--state-action);
    flex-shrink:0;
    margin-right:.6em;
  }
  .input-wrap{display:flex;align-items:center;min-width:0;position:relative}
  #ghost{color:var(--fg-3);font:inherit;font-weight:500;pointer-events:none;white-space:nowrap;display:inline-block;width:0;overflow:visible}
  #input{
    background:none;
    border:none;
    color:var(--fg-0);
    font:inherit;
    font-weight:500;
    outline:none;
    caret-color:transparent;
    overflow-wrap:anywhere;
    padding:0;margin:0;
    min-height:var(--lh);
    -webkit-user-modify:read-write-plaintext-only;
  }
  #input br{display:none}

  /* block cursor */
  .cursor{
    display:inline-block;
    width:1ch;height:var(--lh);
    background:var(--fg-0);
    vertical-align:baseline;
    animation:blink 1s steps(1) infinite;
    flex-shrink:0;
  }
  @keyframes blink{50%{opacity:0}}

  /* processing spinner */
  .processing{color:var(--state-core);margin-bottom:.15rem}

  /* reduced motion */
  @media(prefers-reduced-motion:reduce){
    .cursor{animation:none}
  }
</style>
</head>
<body>
<div class="terminal" id="term">
  <div class="input-line" style="display:none">
    <div class="input-wrap">
      <div id="input" contenteditable="true" role="textbox" spellcheck="false" autocorrect="off" autocapitalize="off"></div><span id="ghost"></span><span class="cursor" id="cursor"></span>
    </div>
  </div>
</div>


<script>
const term = document.getElementById('term');
const input = document.getElementById('input');
const inputLine = input.closest('.input-line');
let markEl, logoEl;

// ── reduced motion ──────────────────────────────
const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const CHAR_DELAY = reducedMotion ? 0 : 15;
const LINE_PAUSE = reducedMotion ? 0 : 200;
const LINE_DELAY = reducedMotion ? 0 : 40;

// ── follow-tail scroll ──────────────────────────
let isFollowing = true;
window.addEventListener('scroll', () => {
  const dist = document.documentElement.scrollHeight - window.scrollY - window.innerHeight;
  isFollowing = dist < 50;
});
function scrollToBottom() {
  window.scrollTo(0, document.documentElement.scrollHeight);
}
function forceFollow() {
  isFollowing = true;
  scrollToBottom();
}

// ── boot sequence (typewriter) ──────────────────
const bootLines = [
  {html: '<div class="logo-wrap" id="logo"><span class="mark-char" id="mark">[*]</span> autorun.dev</div>', isLogo: true},
  {html: '<div class="line dim">    ai-native tools &amp; products</div>', color: 'var(--fg-2)'},
  {html: '<div class="line dim">    v0.1.0</div>', color: 'var(--fg-2)'},
  {noType: true},
  {bootSequence: true},
  {html: '<div class="line"><span class="st st-presence">[:]</span> <span class="dim">agents online:</span> 3</div>', color: 'var(--fg-2)'},
  {html: '<div class="line"><span class="st st-presence">[:]</span> <span class="dim">type</span> <span class="cmd">help</span> <span class="dim">to see available commands.</span></div>', color: 'var(--fg-2)'},
  {noType: true},
];

async function renderBoot() {
  for (const line of bootLines) {
    if (line.noType) {
      const el = document.createElement('div');
      el.className = 'blank';
      term.insertBefore(el, inputLine);
      await sleep(LINE_PAUSE);
      continue;
    }
    if (line.bootSequence) {
      const el = document.createElement('div');
      el.className = 'line';
      el.style.whiteSpace = 'pre-wrap';
      el.style.color = 'var(--fg-2)';
      term.insertBefore(el, inputLine);
      // type "booting autorun.dev "
      const prefix = '[.] booting autorun.dev ';
      for (const ch of prefix) {
        el.textContent += ch;
        if (isFollowing) scrollToBottom();
        await sleep(CHAR_DELAY);
      }
      // dots one by one with pause
      for (let d = 0; d < 3; d++) {
        el.textContent += '.';
        if (isFollowing) scrollToBottom();
        await sleep(reducedMotion ? 0 : 600);
      }
      // ok
      await sleep(reducedMotion ? 0 : 300);
      el.innerHTML = '<span class="st st-idle">[.]</span> <span class="dim">booting autorun.dev ...</span> <span class="st st-live">ok</span>';
      if (isFollowing) scrollToBottom();
      await sleep(LINE_PAUSE);
      continue;
    }
    if (line.isLogo) {
      const wrap = document.createElement('div');
      wrap.innerHTML = line.html;
      const logoNode = wrap.firstElementChild;
      term.insertBefore(logoNode, inputLine);
      markEl = document.getElementById('mark');
      logoEl = document.getElementById('logo');
      logoEl.addEventListener('mouseenter', () => animateMark(RUNTIME_LOOP, RUNTIME_COLORS, 200));
      logoEl.addEventListener('click', () => animateMark(RUNTIME_LOOP, RUNTIME_COLORS, 150));
      await sleep(LINE_PAUSE);
      continue;
    }
    // typewriter: type char by char in default color, then swap to styled
    const tmp = document.createElement('div');
    tmp.innerHTML = line.html;
    const raw = tmp.textContent;
    const el = document.createElement('div');
    el.className = 'line';
    el.style.whiteSpace = 'pre-wrap';
    if (line.color) el.style.color = line.color;
    term.insertBefore(el, inputLine);
    for (const ch of raw) {
      el.textContent += ch;
      if (isFollowing) scrollToBottom();
      await sleep(CHAR_DELAY);
    }
    // swap to fully styled version
    el.replaceWith(tmp.firstElementChild);
    if (isFollowing) scrollToBottom();
    await sleep(LINE_PAUSE);
  }
  // show input
  inputLine.style.display = '';
  if (isFollowing) scrollToBottom();
  focusEnd();
  scheduleBreath();
  resetIdleTimer();
}

renderBoot();

// ── state mark animation ──────────────────────────
const RUNTIME_LOOP = ['[*]','[/]','[-]','[\\]'];
const RUNTIME_COLORS = ['st-core','st-core','st-idle','st-core'];
let logoAnimating = false;

function animateMark(sequence, colors, stepMs, onDone) {
  if (logoAnimating) return;
  logoAnimating = true;
  let i = 0;
  function step() {
    if (i >= sequence.length) {
      markEl.textContent = '[*]';
      markEl.className = 'mark-char st-core';
      logoAnimating = false;
      if (onDone) onDone();
      return;
    }
    markEl.textContent = sequence[i];
    markEl.className = 'mark-char ' + (colors[i] || 'st-core');
    i++;
    setTimeout(step, stepMs);
  }
  step();
}

// periodic idle breath: every 8-15s
function scheduleBreath() {
  const delay = 8000 + Math.random() * 7000;
  setTimeout(() => {
    if (!logoAnimating) {
      animateMark(
        ['[.]','[:]','[_]','[*]'],
        ['st-idle','st-presence','st-idle','st-core'],
        800,
        scheduleBreath
      );
    } else {
      scheduleBreath();
    }
  }, delay);
}
// logo events bound in renderBoot()

// ── processing spinner on [>] ─────────────────────
function showProcessing(cmdLineEl) {
  return new Promise(resolve => {
    inputLine.style.display = 'none';
    const mark = cmdLineEl.querySelector('.st');
    const frames = ['[/]','[-]','[\\]','[-]','[>]'];
    let i = 0;
    mark.classList.remove('st-action');
    mark.classList.add('st-core');
    const iv = setInterval(() => {
      if (i >= frames.length) {
        clearInterval(iv);
        mark.textContent = '[>]';
        mark.classList.remove('st-core');
        mark.classList.add('st-action');
        resolve();
        return;
      }
      mark.textContent = frames[i];
      i++;
    }, 120);
  });
}

// ── theme system ──────────────────────────────────
function getTheme() {
  return localStorage.getItem('autorun-theme') || 'system';
}
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('autorun-theme', t);
}
applyTheme(getTheme());

// ── commands ──────────────────────────────────────
const commands = {
  help: () =>
    '<span class="st st-core">[*]</span> available commands:\n' +
    '    about    <span style="color:var(--fg-3)"> - what we do</span>\n' +
    '    projects <span style="color:var(--fg-3)"> - things we ship</span>\n' +
    '    team     <span style="color:var(--fg-3)"> - who\'s behind the terminal</span>\n' +
    '    stack    <span style="color:var(--fg-3)"> - how we build</span>\n' +
    '    config   <span style="color:var(--fg-3)"> - settings</span>\n' +
    '    clear    <span style="color:var(--fg-3)"> - wipe the screen</span>',

  about: () =>
    '<span class="st st-core">[*]</span> what we do\n' +
    '    autorun.dev builds ai-native products that\n' +
    '    run where people already live - messengers,\n' +
    '    games, markets. small crew. tight loops.\n' +
    '    no meetings that could\'ve been a commit.\n' +
    '&nbsp;\n' +
    '    <span class="dim">thesis: the best software in 2026 doesn\'t</span>\n' +
    '    <span class="dim">have a ui. it has an agent.</span>',

  team: () =>
    '<span class="st st-core">[*]</span> who\'s behind the terminal\n' +
    '    small, senior, remote. product engineers\n' +
    '    who ship end-to-end - design, code, growth,\n' +
    '    ops.\n' +
    '&nbsp;\n' +
    '    founder:  <span style="color:var(--fg-0)">anton frolov</span>\n' +
    '              vibe coder (unironically)\n' +
    '&nbsp;\n' +
    '    crew:     engineers, designers, degens\n' +
    '    hiring:   always, if you\'re the real thing.\n' +
    '              → <a href="mailto:hello@autorun.dev" style="color:var(--state-core);text-decoration:none">hello@autorun.dev</a>',

  projects: () => '__projects__',

  stack: () =>
    '<span class="st st-core">[*]</span> how we build\n' +
    '    claude · typescript · python · telegram\n' +
    '    sqlite-and-prayers · vps · tmux · vibes\n' +
    '&nbsp;\n' +
    '    <span class="st st-alert">[!]</span> we deploy on fridays.\n' +
    '        <span class="dim">and midnights. no one stops us.</span>',

  config: (args) => {
    if (!args) {
      return '<span class="st st-core">[*]</span> settings\n' +
        '    <span class="dim">current theme:</span> ' + getTheme() + '\n' +
        '&nbsp;\n' +
        '    <span class="dim">usage:</span>\n' +
        '    config theme dark\n' +
        '    config theme light\n' +
        '    config theme system';
    }
    const parts = args.split(/\s+/);
    if (parts[0] === 'theme' && ['dark','light','system'].includes(parts[1])) {
      applyTheme(parts[1]);
      return '<span class="st st-live">[+]</span> theme set to <span style="color:var(--fg-0)">' + parts[1] + '</span>';
    }
    return '<span class="st st-alert">[?]</span> <span class="dim">unknown config. try:</span> config theme dark|light|system';
  },

  clear: () => '__clear__',
};

const projectsHTML = `
  <div class="line"><span class="st st-core">[*]</span> things we ship</div>
  <div class="blank"></div>
  <a href="https://vectoros.ai" target="_blank" rel="noopener" class="proj-link">
    <div class="line"><span class="st st-presence">[:]</span> <span style="color:var(--brand-vectoros)">vectoros</span><span class="proj-arrow"> →</span></div>
    <div class="line">    ai companion for telegram.</div>
    <div class="line">    second brain powered by claude.</div>
    <div class="line">    <span class="st st-live">[status: live]</span></div>
  </a>
  <div class="blank"></div>
  <a href="https://playsnap.bot" target="_blank" rel="noopener" class="proj-link">
    <div class="line"><span class="st st-presence">[:]</span> <span style="color:var(--brand-playsnap-play)">play</span><span style="color:var(--brand-playsnap-snap)">snap</span><span class="proj-arrow"> →</span></div>
    <div class="line">    minimalist hockey for telegram.</div>
    <div class="line">    one button. perfect timing. no tutorial.</div>
    <div class="line">    <span class="st st-live">[status: live]</span></div>
  </a>
  <div class="blank"></div>
  <div class="line"><span class="st st-idle">[.]</span> <span style="color:var(--fg-1)">********</span></div>
  <div class="line" style="color:var(--fg-1)">    ********* *** ******.</div>
  <div class="line">    <span class="st st-stealth">[status: stealth]</span></div>`;

// ── autocomplete + idle suggest ───────────────────
const ghost = document.getElementById('ghost');
const cmdList = ['help','about','projects','team','stack','config','clear'];
let idleTimer = null;
let suggestTimer = null;
let suggestActive = false;

function updateGhost() {
  const val = input.textContent.trim().toLowerCase();
  if (!val) {
    ghost.textContent = '';
    return;
  }
  const match = cmdList.find(c => c.startsWith(val) && c !== val);
  ghost.textContent = match ? match.slice(val.length) : '';
}

function clearSuggest() {
  ghost.textContent = '';
  suggestActive = false;
  if (suggestTimer) { clearTimeout(suggestTimer); suggestTimer = null; }
}

function resetIdleTimer() {
  if (idleTimer) clearTimeout(idleTimer);
  if (input.textContent.trim()) return; // don't suggest while typing
  idleTimer = setTimeout(showSuggest, 5000);
}

function showSuggest() {
  if (input.textContent.trim() || processing) {
    resetIdleTimer();
    return;
  }
  const cmd = cmdList[Math.floor(Math.random() * cmdList.length)];
  ghost.textContent = cmd;
  suggestActive = true;
  suggestTimer = setTimeout(() => {
    if (suggestActive && !input.textContent.trim()) {
      ghost.textContent = '';
      suggestActive = false;
      resetIdleTimer();
    }
  }, 3000);
}

input.addEventListener('input', () => {
  clearSuggest();
  updateGhost();
  resetIdleTimer();
});

// ── input handling ────────────────────────────────
input.addEventListener('paste', e => {
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData('text/plain').replace(/\n/g,'');
  document.execCommand('insertText', false, text);
});

let processing = false;

input.addEventListener('keydown', async e => {
  // Tab = accept autocomplete/suggest
  if (e.key === 'Tab') {
    e.preventDefault();
    if (ghost.textContent) {
      input.textContent += ghost.textContent;
      ghost.textContent = '';
      suggestActive = false;
      // move caret to end
      const sel = window.getSelection();
      sel.selectAllChildren(input);
      sel.collapseToEnd();
    }
    return;
  }

  if (e.key !== 'Enter' || processing) return;
  e.preventDefault();

  // \ + Enter = line continuation
  if (input.textContent.endsWith('\\')) {
    input.textContent = input.textContent.slice(0, -1);
    const sel = window.getSelection();
    sel.selectAllChildren(input);
    sel.collapseToEnd();
    return;
  }

  clearSuggest();
  const raw = input.textContent.trim();
  const val = raw.toLowerCase();
  input.textContent = '';
  ghost.textContent = '';
  if (!val) return;

  // force follow on new command input
  isFollowing = true;

  // log all input (fire-and-forget)
  fetch('/api/log', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({input:val})}).catch(()=>{});

  // echo command
  const cmdLine = document.createElement('div');
  cmdLine.className = 'line';
  cmdLine.innerHTML = `<span class="st st-action">[>]</span> <span class="cmd">${esc(raw)}</span>`;
  term.insertBefore(cmdLine, inputLine);

  if (val === 'clear') {
    while (term.firstChild !== inputLine) term.removeChild(term.firstChild);
    return;
  }

  // spinner inline with command (hides inputLine, does NOT restore it)
  processing = true;
  await showProcessing(cmdLine);
  processing = false;

  // parse command + args
  const spaceIdx = val.indexOf(' ');
  const cmd = spaceIdx > -1 ? val.slice(0, spaceIdx) : val;
  const args = spaceIdx > -1 ? val.slice(spaceIdx + 1).trim() : '';

  const handler = commands[cmd];
  if (handler) {
    const result = handler(args || undefined);
    if (result === '__projects__') {
      const wrap = document.createElement('div');
      wrap.innerHTML = projectsHTML;
      for (const child of [...wrap.children]) {
        term.insertBefore(child, inputLine);
        if (isFollowing) scrollToBottom();
        await sleep(LINE_DELAY);
      }
    } else {
      const lines = result.split('\n');
      for (const l of lines) {
        const out = document.createElement('div');
        out.className = 'line';
        out.innerHTML = l;
        term.insertBefore(out, inputLine);
        if (isFollowing) scrollToBottom();
        await sleep(LINE_DELAY);
      }
    }
  } else {
    // ask backend for easter eggs
    var backendData = null;
    try {
      const res = await fetch('/api/cmd', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({input: val, lang: 'en'}),
      });
      backendData = await res.json();
      if (backendData.lines && backendData.lines.length > 0) {
        await renderLines(backendData.lines);
      } else if (!backendData.effect) {
        renderNotFound(val);
      }
    } catch {
      renderNotFound(val);
    }
  }

  // blank + show inputLine atomically (no jump)
  const blank = document.createElement('div');
  blank.className = 'blank';
  term.insertBefore(blank, inputLine);
  inputLine.style.display = '';
  forceFollow();

  // run effect after layout is settled
  if (typeof backendData !== 'undefined' && backendData?.effect) {
    const delay = backendData.delay || 0;
    if (delay) await sleep(delay);
    await runEffect(backendData.effect);
  }
  resetIdleTimer();
});

// ── render helpers ───────────────────────────────
async function renderLines(lines) {
  for (const l of lines) {
    const out = document.createElement('div');
    out.className = 'line';

    // spinner lines: spin for duration, resolve to [:]
    if (l.spinner) {
      const spinMark = document.createElement('span');
      spinMark.className = 'st st-core';
      out.appendChild(spinMark);
      out.appendChild(document.createTextNode(' ' + (l.text || '')));
      term.insertBefore(out, inputLine);
      if (isFollowing) scrollToBottom();
      const dur = l.duration || 800;
      const frames = ['[/]','[-]','[\\]','[-]'];
      const end = Date.now() + dur;
      let fi = 0;
      while (Date.now() < end) {
        spinMark.textContent = frames[fi % frames.length];
        fi++;
        await sleep(120);
      }
      spinMark.textContent = '[:]';
      spinMark.className = 'st st-presence';
      await sleep(LINE_DELAY);
      continue;
    }

    // lines with a mark get a brief spinner first
    if (l.mark && l.mark !== '[*]') {
      const spinMark = document.createElement('span');
      spinMark.className = 'st st-core';
      out.appendChild(spinMark);
      out.appendChild(document.createTextNode(' ' + (l.text || '')));
      term.insertBefore(out, inputLine);
      if (isFollowing) scrollToBottom();
      const frames = ['[/]','[-]','[\\]','[-]'];
      for (const f of frames) {
        spinMark.textContent = f;
        await sleep(120);
      }
      spinMark.textContent = l.mark;
      spinMark.className = 'st st-' + markClass(l.mark);
      await sleep(LINE_DELAY);
      continue;
    }

    let html = '';
    if (l.mark) html += `<span class="st st-${markClass(l.mark)}">${esc(l.mark)}</span> `;
    if (l.indent) html += '    ';
    const text = l.muted ? `<span class="dim">${esc(l.text)}</span>` : esc(l.text);
    html += l.bold ? `<strong>${text}</strong>` : text;
    if (l.state) out.innerHTML = html.replace(esc(l.text), `<span class="st st-${l.state}">${esc(l.text)}</span>`);
    else out.innerHTML = html;
    term.insertBefore(out, inputLine);
    if (isFollowing) scrollToBottom();
    await sleep(LINE_DELAY);
  });
}

function renderNotFound(val) {
  const l1 = document.createElement('div');
  l1.className = 'line';
  l1.innerHTML = `<span class="st st-alert">[!]</span> command not found: ${esc(val)}`;
  term.insertBefore(l1, inputLine);
  const l2 = document.createElement('div');
  l2.className = 'line dim';
  l2.textContent = '    try `help`';
  term.insertBefore(l2, inputLine);
}

function markClass(mark) {
  const m = mark.replace(/[\[\]]/g, '');
  const map = {'*':'core','>':'action',':':'presence','.':'idle','!':'alert','x':'stop','+':'live','?':'alert','-':'idle','/':'core','\\':'core'};
  return map[m] || 'core';
}

// ── effects ──────────────────────────────────────
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runEffect(name) {
  const fx = {matrix_rain: fxMatrix, glitch: fxGlitch, reboot: fxReboot};
  if (fx[name]) await fx[name]();
}

// matrix rain — inline terminal effect, grows downward
async function fxMatrix() {
  const pool = 'abcdefghijklmnopqrstuvwxyz0123456789@#$%&*+-=~[]{}()/|.:;!?абвгдежзиклмнопрстуфхцчшщэюя';
  const rc = () => pool[Math.floor(Math.random() * pool.length)];
  const COLS = 60;
  const ROWS = 22;

  // anchor = the [>] command line (2 up from inputLine: cmd, blank, input)
  let anchor = inputLine.previousElementSibling; // blank
  if (anchor) anchor = anchor.previousElementSibling; // cmd line
  if (!anchor) return;

  const style = getComputedStyle(document.body);
  const lineH = parseFloat(style.lineHeight) || 18;

  // position overlay relative to terminal
  term.style.position = 'relative';
  const topOffset = anchor.offsetTop;

  const overlay = document.createElement('div');
  Object.assign(overlay.style, {
    position: 'absolute',
    top: topOffset + 'px',
    left: '0',
    right: '0',
    zIndex: '10',
    font: 'inherit',
    lineHeight: lineH + 'px',
    whiteSpace: 'pre',
    pointerEvents: 'none',
  });
  term.appendChild(overlay);

  // pre-create row elements
  const rowEls = [];
  for (let r = 0; r < ROWS; r++) {
    const row = document.createElement('div');
    row.textContent = ' '.repeat(COLS);
    overlay.appendChild(row);
    rowEls.push(row);
  }

  // ~18 streams
  const NUM_DROPS = 18;
  const usedCols = new Set();
  while (usedCols.size < NUM_DROPS) usedCols.add(Math.floor(Math.random() * COLS));

  const drops = [];
  for (const c of usedCols) {
    drops.push({
      col: c,
      y: -1 - Math.floor(Math.random() * 8),
      speed: 0.5,
      trail: 4 + Math.floor(Math.random() * 6),
      acc: 0,
    });
  }

  // char + color buffers
  const buf = [];
  const clr = []; // 0=transparent, 1=head(white+bg), 2=trail(green+bg), 3=dim(green+bg)
  for (let r = 0; r < ROWS; r++) {
    buf.push(new Array(COLS).fill(' '));
    clr.push(new Uint8Array(COLS));
  }

  const bg = getComputedStyle(document.documentElement).getPropertyValue('--bg-0').trim();
  const tickMs = 60;

  let done = false;
  while (!done) {
    for (const d of drops) {
      d.acc += d.speed;
      while (d.acc >= 1) { d.y++; d.acc -= 1; }
    }

    for (const d of drops) {
      const c = d.col;
      for (let r = 0; r < ROWS; r++) {
        const dist = d.y - r;
        if (dist === 0) {
          buf[r][c] = rc(); clr[r][c] = 1;
        } else if (dist > 0 && dist <= d.trail) {
          buf[r][c] = rc(); clr[r][c] = dist <= 2 ? 2 : 3;
        } else if (dist > d.trail) {
          buf[r][c] = ' '; clr[r][c] = 0;
        }
      }
    }

    // render each row
    for (let r = 0; r < ROWS; r++) {
      let html = '';
      let cur = -1;
      let seg = '';
      for (let c = 0; c < COLS; c++) {
        const cl = clr[r][c];
        if (cl !== cur) {
          if (seg) html += wrapSeg(seg, cur);
          seg = ''; cur = cl;
        }
        const ch = buf[r][c];
        seg += ch === '<' ? '&lt;' : ch === '&' ? '&amp;' : ch;
      }
      if (seg) html += wrapSeg(seg, cur);
      rowEls[r].innerHTML = html;
    }

    if (drops.every(d => (d.y - d.trail) >= ROWS)) done = true;
    await sleep(tickMs);
  }

  overlay.remove();
  term.style.position = '';

  function wrapSeg(s, cl) {
    if (cl === 0) return `<span style="color:transparent">${s}</span>`;
    if (cl === 1) return `<span style="color:#fff;background:${bg}">${s}</span>`;
    if (cl === 2) return `<span style="color:var(--state-live);background:${bg}">${s}</span>`;
    return `<span style="color:#1a6b35;background:${bg}">${s}</span>`;
  }
}

// glitch — CRT distortion
async function fxGlitch() {
  const el = document.querySelector('.terminal');
  const duration = 600;
  const start = Date.now();

  function frame() {
    const t = Date.now() - start;
    if (t > duration) {
      el.style.transform = '';
      el.style.filter = '';
      el.style.textShadow = '';
      el.style.clipPath = '';
      return;
    }
    const intensity = Math.sin(t * 0.05) * (1 - t / duration);
    const skewX = (Math.random() - 0.5) * 8 * intensity;
    const skewY = (Math.random() - 0.5) * 2 * intensity;
    const tx = (Math.random() - 0.5) * 12 * intensity;
    const r = (Math.random() - 0.5) * 4 * intensity;
    const g = (Math.random() - 0.5) * 4 * intensity;
    el.style.transform = `skew(${skewX}deg,${skewY}deg) translateX(${tx}px)`;
    el.style.textShadow = `${r}px 0 rgba(255,0,0,0.7), ${g}px 0 rgba(0,255,255,0.7)`;

    // random scanline clip
    if (Math.random() < 0.3 * Math.abs(intensity)) {
      const y1 = Math.random() * 100;
      const y2 = y1 + 2 + Math.random() * 8;
      el.style.clipPath = `polygon(0 0,100% 0,100% ${y1}%,0 ${y1}%,0 ${y2}%,100% ${y2}%,100% 100%,0 100%)`;
    } else {
      el.style.clipPath = '';
    }

    requestAnimationFrame(frame);
  }
  frame();
  await sleep(duration + 50);
}

// reboot — clear + re-run boot
async function fxReboot() {
  term.style.transition = 'opacity .3s ease-out';
  term.style.opacity = '0';
  await sleep(300);

  // clear everything except input line
  while (term.firstChild !== inputLine) term.removeChild(term.firstChild);
  inputLine.style.display = 'none';
  window.scrollTo(0, 0);
  isFollowing = true;

  term.style.opacity = '1';
  await sleep(200);

  // replay boot with typewriter
  await renderBoot();
}

// ── focus management ──────────────────────────────
function focusEnd() {
  input.focus();
  const sel = window.getSelection();
  sel.selectAllChildren(input);
  sel.collapseToEnd();
}

document.addEventListener('click', e => {
  if (!input.contains(e.target) && !e.target.closest('a')) focusEnd();
});
requestAnimationFrame(focusEnd);

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
