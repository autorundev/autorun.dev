<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
<meta charset="UTF-8">

<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  /* === DARK THEME === */
  :root,
  [data-theme="dark"]{
    --bg-0:#0A0A0A;
    --bg-1:#111111;
    --bg-2:#1A1A1A;
    --fg-0:#E8E8E8;
    --fg-1:#A0A0A0;
    --fg-2:#606060;
    --fg-3:#404040;
    --state-core:#7DD3FC;
    --state-action:#E8E8E8;
    --state-presence:#A78BFA;
    --state-live:#4ADE80;
    --state-alert:#FBBF24;
    --state-stop:#F87171;
    --state-stealth:#A0A0A0;
  }

  /* === LIGHT THEME === */
  [data-theme="light"]{
    --bg-0:#FAFAFA;
    --bg-1:#F4F4F4;
    --bg-2:#EDEDED;
    --fg-0:#0A0A0A;
    --fg-1:#404040;
    --fg-2:#707070;
    --fg-3:#B0B0B0;
    --state-core:#0284C7;
    --state-action:#0A0A0A;
    --state-presence:#7C3AED;
    --state-live:#16A34A;
    --state-alert:#D97706;
    --state-stop:#DC2626;
    --state-stealth:#707070;
  }

  /* === SYSTEM THEME === */
  @media(prefers-color-scheme:light){
    [data-theme="system"]{
      --bg-0:#FAFAFA;
      --bg-1:#F4F4F4;
      --bg-2:#EDEDED;
      --fg-0:#0A0A0A;
      --fg-1:#404040;
      --fg-2:#707070;
      --fg-3:#B0B0B0;
      --state-core:#0284C7;
      --state-action:#0A0A0A;
      --state-presence:#7C3AED;
      --state-live:#16A34A;
      --state-alert:#D97706;
      --state-stop:#DC2626;
      --state-stealth:#707070;
    }
  }

  html{font-size:14px}
  body{
    background:var(--bg-0);
    color:var(--fg-0);
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:14px;
    line-height:18px;
    letter-spacing:0;
    font-variant-ligatures:none;
    font-feature-settings:'liga' 0,'calt' 0;
    min-height:100dvh;
    display:flex;
    justify-content:center;
    padding:2rem 16px;
    -webkit-font-smoothing:antialiased;
    transition:background .3s ease-out,color .3s ease-out;
  }
  .terminal{
    max-width:640px;
    width:100%;
    overflow-x:hidden;
  }
  .line{margin-bottom:.15rem;white-space:pre-wrap}
  .cmd{color:var(--fg-0);font-weight:500}
  .dim{color:var(--fg-2)}
  .blank{height:18px}

  /* state marks */
  .st{font-weight:500;display:inline;}
  .st-core{color:var(--state-core)}
  .st-action{color:var(--state-action)}
  .st-presence{color:var(--state-presence)}
  .st-live{color:var(--state-live)}
  .st-alert{color:var(--state-alert)}
  .st-stop{color:var(--state-stop)}
  .st-stealth{color:var(--state-stealth)}
  .st-idle{color:var(--fg-2)}

  /* logo */
  .logo-wrap{cursor:pointer;display:inline-block}
  .logo-mark{
    font-weight:800;
    display:flex;
    align-items:center;
    gap:.4em;
  }
  .logo-mark .mark-char{
    color:var(--state-core);
    transition:color .1s;
  }

  /* projects */
  .project{
    display:block;
    margin:.5rem 0 .5rem 0;
    text-decoration:none;
    color:var(--fg-0);
    border-left:2px solid var(--fg-3);
    padding-left:1rem;
    transition:border-color .2s;
  }
  .project:hover{border-color:var(--state-core)}
  .project-name{color:var(--state-core);font-weight:800}
  .project-desc{color:var(--fg-2)}
  .project-status{}

  /* interactive input */
  .input-line{display:flex;align-items:center}
  .input-line::before{
    content:'[>]';
    color:var(--state-action);
    flex-shrink:0;
    margin-right:.6em;
  }
  .input-wrap{display:flex;align-items:center;min-width:0}
  #input{
    background:none;
    border:none;
    color:var(--fg-0);
    font:inherit;
    font-weight:500;
    outline:none;
    caret-color:transparent;
    white-space:nowrap;
    padding:0;margin:0;
    min-height:18px;
    -webkit-user-modify:read-write-plaintext-only;
  }
  #input br{display:none}

  /* block cursor */
  .cursor{
    display:inline-block;
    width:8px;height:18px;
    background:var(--fg-0);
    vertical-align:baseline;
    animation:blink 1s step-end infinite;
    flex-shrink:0;
  }
  @keyframes blink{50%{opacity:0}}

  /* processing spinner */
  .processing{color:var(--state-core);margin-bottom:.15rem}

  /* reduced motion */
  @media(prefers-reduced-motion:reduce){
    .cursor{animation:none}
  }
</style>
</head>
<body>
<div class="terminal" id="term">

  <div class="logo-wrap" id="logo">
    <div class="logo-mark"><span class="mark-char" id="mark">[*]</span>autorun.dev</div>
  </div>
  <div class="line dim">ai-native tools &amp; products</div>
  <div class="line dim">v0.1.0</div>
  <div class="blank"></div>
  <div class="line"><span class="st st-idle">[.]</span> <span class="dim">booting autorun.dev ...</span> <span class="st st-live">ok</span></div>
  <div class="line"><span class="st st-presence">[:]</span> <span class="dim">agents online:</span> 3</div>
  <div class="line"><span class="st st-presence">[:]</span> <span class="dim">type</span> <span class="cmd">help</span> <span class="dim">to see available commands.</span></div>
  <div class="blank"></div>

  <div class="input-line">
    <div class="input-wrap">
      <div id="input" contenteditable="true" role="textbox" spellcheck="false" autocorrect="off" autocapitalize="off"></div><span class="cursor" id="cursor"></span>
    </div>
  </div>

</div>

<template id="boot-template">
  <div class="logo-wrap" id="logo">
    <div class="logo-mark"><span class="mark-char" id="mark">[*]</span>autorun.dev</div>
  </div>
  <div class="line dim">ai-native tools &amp; products</div>
  <div class="line dim">v0.1.0</div>
  <div class="blank"></div>
  <div class="line"><span class="st st-idle">[.]</span> <span class="dim">booting autorun.dev ...</span> <span class="st st-live">ok</span></div>
  <div class="line"><span class="st st-presence">[:]</span> <span class="dim">agents online:</span> 3</div>
  <div class="line"><span class="st st-presence">[:]</span> <span class="dim">type</span> <span class="cmd">help</span> <span class="dim">to see available commands.</span></div>
  <div class="blank"></div>
</template>

<script>
const term = document.getElementById('term');
const input = document.getElementById('input');
const inputLine = input.closest('.input-line');
let markEl = document.getElementById('mark');
let logoEl = document.getElementById('logo');

// ── state mark animation ──────────────────────────
const RUNTIME_LOOP = ['[*]','[/]','[-]','[\\]'];
const RUNTIME_COLORS = ['st-core','st-core','st-idle','st-core'];
let logoAnimating = false;

function animateMark(sequence, colors, stepMs, onDone) {
  if (logoAnimating) return;
  logoAnimating = true;
  let i = 0;
  function step() {
    if (i >= sequence.length) {
      markEl.textContent = '[*]';
      markEl.className = 'mark-char st-core';
      logoAnimating = false;
      if (onDone) onDone();
      return;
    }
    markEl.textContent = sequence[i];
    markEl.className = 'mark-char ' + (colors[i] || 'st-core');
    i++;
    setTimeout(step, stepMs);
  }
  step();
}

// periodic idle breath: every 8-15s
function scheduleBreath() {
  const delay = 8000 + Math.random() * 7000;
  setTimeout(() => {
    if (!logoAnimating) {
      animateMark(
        ['[.]','[:]','[_]','[*]'],
        ['st-idle','st-presence','st-idle','st-core'],
        800,
        scheduleBreath
      );
    } else {
      scheduleBreath();
    }
  }, delay);
}
scheduleBreath();

// hover/tap triggers runtime loop
logoEl.addEventListener('mouseenter', () => {
  animateMark(RUNTIME_LOOP, RUNTIME_COLORS, 200);
});
logoEl.addEventListener('click', e => {
  if (e.target.closest('.input-line')) return;
  animateMark(RUNTIME_LOOP, RUNTIME_COLORS, 150);
});

// ── processing spinner on [>] ─────────────────────
function showProcessing(cmdLineEl) {
  return new Promise(resolve => {
    inputLine.style.display = 'none';
    const mark = cmdLineEl.querySelector('.st');
    const frames = ['[/]','[-]','[\\]','[-]','[>]'];
    let i = 0;
    mark.classList.remove('st-action');
    mark.classList.add('st-core');
    const iv = setInterval(() => {
      if (i >= frames.length) {
        clearInterval(iv);
        mark.textContent = '[>]';
        mark.classList.remove('st-core');
        mark.classList.add('st-action');
        inputLine.style.display = '';
        resolve();
        return;
      }
      mark.textContent = frames[i];
      i++;
    }, 120);
  });
}

// ── theme system ──────────────────────────────────
function getTheme() {
  return localStorage.getItem('autorun-theme') || 'system';
}
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('autorun-theme', t);
}
applyTheme(getTheme());

// ── commands ──────────────────────────────────────
const commands = {
  help: () =>
    '<span class="st st-core">[*]</span> available commands:\n' +
    '   about    <span style="color:var(--fg-3)"> - what we do</span>\n' +
    '   projects <span style="color:var(--fg-3)"> - things we ship</span>\n' +
    '   team     <span style="color:var(--fg-3)"> - who\'s behind the terminal</span>\n' +
    '   stack    <span style="color:var(--fg-3)"> - how we build</span>\n' +
    '   config   <span style="color:var(--fg-3)"> - settings</span>\n' +
    '   clear    <span style="color:var(--fg-3)"> - wipe the screen</span>',

  about: () =>
    '<span class="st st-core">[*]</span> about\n' +
    '   autorun.dev builds ai-native products that\n' +
    '   run where people already live - messengers,\n' +
    '   games, markets. small crew. tight loops.\n' +
    '   no meetings that could\'ve been a commit.\n' +
    '\n' +
    '   <span class="dim">thesis: the best software in 2026 doesn\'t</span>\n' +
    '   <span class="dim">have a ui. it has an agent.</span>',

  team: () =>
    '<span class="st st-core">[*]</span> team\n' +
    '   small, senior, remote. product engineers\n' +
    '   who ship end-to-end - design, code, growth,\n' +
    '   ops.\n' +
    '\n' +
    '   founder:  <span style="color:var(--fg-0)">anton frolov</span>\n' +
    '             vibe coder (unironically)\n' +
    '\n' +
    '   crew:     engineers, designers, degens\n' +
    '   hiring:   always, if you\'re the real thing.\n' +
    '             → <a href="mailto:hello@autorun.dev" style="color:var(--state-core);text-decoration:none">hello@autorun.dev</a>',

  projects: () => '__projects__',

  stack: () =>
    '<span class="st st-core">[*]</span> stack\n' +
    '   claude · typescript · python · telegram\n' +
    '   sqlite-and-prayers · vps · tmux · vibes\n' +
    '\n' +
    '   <span class="st st-alert">[!]</span> we deploy on fridays.\n' +
    '   <span class="dim">and midnights. no one stops us.</span>',

  config: (args) => {
    if (!args) {
      return '<span class="dim">current theme:</span> ' + getTheme() + '\n' +
        '\n' +
        '<span class="dim">usage:</span>\n' +
        '  config theme dark\n' +
        '  config theme light\n' +
        '  config theme system';
    }
    const parts = args.split(/\s+/);
    if (parts[0] === 'theme' && ['dark','light','system'].includes(parts[1])) {
      applyTheme(parts[1]);
      return '<span class="st st-live">[+]</span> theme set to <span style="color:var(--fg-0)">' + parts[1] + '</span>';
    }
    return '<span class="st st-alert">[?]</span> <span class="dim">unknown config. try:</span> config theme dark|light|system';
  },

  clear: () => '__clear__',
};

const projectsHTML = `
  <a href="https://vectoros.ai" target="_blank" rel="noopener" class="project">
    <div class="project-name">vectoros.ai →</div>
    <div class="project-desc">ai companion for telegram.<br>second brain powered by claude.</div>
    <div class="project-status st-live">[status: live]</div>
  </a>
  <a href="https://t.me/playsnap_bot/app" target="_blank" rel="noopener" class="project">
    <div class="project-name">playsnap.bot →</div>
    <div class="project-desc">minimalist hockey for telegram.<br>one button. perfect timing. no tutorial.</div>
    <div class="project-status st-live">[status: live]</div>
  </a>
  <div class="project" style="cursor:default">
    <div class="project-name st-stealth">[redacted]</div>
    <div class="project-desc">something for traders.</div>
    <div class="project-status st-stealth">[status: stealth]</div>
  </div>`;

// ── input handling ────────────────────────────────
input.addEventListener('paste', e => {
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData('text/plain').replace(/\n/g,'');
  document.execCommand('insertText', false, text);
});

let processing = false;

input.addEventListener('keydown', async e => {
  if (e.key !== 'Enter' || processing) return;
  e.preventDefault();
  const raw = input.textContent.trim();
  const val = raw.toLowerCase();
  input.textContent = '';
  if (!val) return;

  // echo command
  const cmdLine = document.createElement('div');
  cmdLine.className = 'line';
  cmdLine.innerHTML = `<span class="st st-action">[>]</span> <span class="cmd">${esc(raw)}</span>`;
  term.insertBefore(cmdLine, inputLine);

  if (val === 'clear') {
    while (term.firstChild !== inputLine) term.removeChild(term.firstChild);
    return;
  }

  // spinner inline with command
  processing = true;
  await showProcessing(cmdLine);
  processing = false;

  // parse command + args
  const spaceIdx = val.indexOf(' ');
  const cmd = spaceIdx > -1 ? val.slice(0, spaceIdx) : val;
  const args = spaceIdx > -1 ? val.slice(spaceIdx + 1).trim() : '';

  const handler = commands[cmd];
  if (handler) {
    const result = handler(args || undefined);
    if (result === '__projects__') {
      const wrap = document.createElement('div');
      wrap.innerHTML = projectsHTML;
      term.insertBefore(wrap, inputLine);
    } else {
      result.split('\n').forEach(l => {
        const out = document.createElement('div');
        out.className = 'line';
        out.innerHTML = l;
        term.insertBefore(out, inputLine);
      });
    }
  } else {
    // ask backend for easter eggs
    try {
      const res = await fetch('/api/cmd', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({input: val, lang: 'en'}),
      });
      const data = await res.json();
      if (data.lines && data.lines.length > 0) {
        renderLines(data.lines);
        if (data.effect) {
          const delay = data.delay || 0;
          if (delay) await sleep(delay);
          await runEffect(data.effect);
        }
      } else {
        renderNotFound(val);
      }
    } catch {
      renderNotFound(val);
    }
  }

  const blank = document.createElement('div');
  blank.className = 'blank';
  term.insertBefore(blank, inputLine);

  inputLine.scrollIntoView({block:'nearest'});
});

// ── render helpers ───────────────────────────────
function renderLines(lines) {
  lines.forEach(l => {
    const out = document.createElement('div');
    out.className = 'line';
    let html = '';
    if (l.mark) html += `<span class="st st-${markClass(l.mark)}">${esc(l.mark)}</span> `;
    if (l.indent) html += '   ';
    const text = l.muted ? `<span class="dim">${esc(l.text)}</span>` : esc(l.text);
    html += l.bold ? `<strong>${text}</strong>` : text;
    if (l.state) out.innerHTML = html.replace(esc(l.text), `<span class="st st-${l.state}">${esc(l.text)}</span>`);
    else out.innerHTML = html;
    term.insertBefore(out, inputLine);
  });
}

function renderNotFound(val) {
  const out = document.createElement('div');
  out.className = 'line';
  out.innerHTML = `<span class="st st-alert">[?]</span> <span class="dim">command not found: ${esc(val)}. try</span> <span class="cmd">help</span>`;
  term.insertBefore(out, inputLine);
}

function markClass(mark) {
  const m = mark.replace(/[\[\]]/g, '');
  const map = {'*':'core','>':'action',':':'presence','.':'idle','!':'alert','x':'stop','+':'live','?':'alert','-':'idle','/':'core','\\':'core'};
  return map[m] || 'core';
}

// ── effects ──────────────────────────────────────
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runEffect(name) {
  const fx = {matrix_rain: fxMatrix, glitch: fxGlitch, reboot: fxReboot};
  if (fx[name]) await fx[name]();
}

// matrix rain — inline terminal effect, grows downward
async function fxMatrix() {
  const pool = 'abcdefghijklmnopqrstuvwxyz0123456789@#$%&*+-=~[]{}()/|.:;!?абвгдежзиклмнопрстуфхцчшщэюя';
  const rc = () => pool[Math.floor(Math.random() * pool.length)];
  const COLS = 60;
  const RAIN_ROWS = 20;

  // find the response line (last .line before inputLine)
  let responseLine = inputLine.previousElementSibling;
  while (responseLine && responseLine.classList.contains('blank')) responseLine = responseLine.previousElementSibling;
  if (!responseLine) return;
  const origHTML = responseLine.innerHTML;
  const origText = responseLine.textContent;

  // pad original text to COLS
  const origPadded = origText.padEnd(COLS).slice(0, COLS);

  // create rain rows below response line
  const rainEls = [];
  const blankBefore = responseLine.nextElementSibling; // the .blank
  for (let i = 0; i < RAIN_ROWS; i++) {
    const row = document.createElement('div');
    row.className = 'line';
    row.style.whiteSpace = 'pre';
    row.style.color = 'var(--state-live)';
    row.textContent = ' '.repeat(COLS);
    term.insertBefore(row, inputLine);
    rainEls.push(row);
  }

  // grid: row 0 = response line, rows 1..RAIN_ROWS = rain lines
  const totalRows = 1 + RAIN_ROWS;

  // drops per column — staggered start
  const drops = [];
  for (let c = 0; c < COLS; c++) {
    drops.push({
      y: -1 - Math.floor(Math.random() * 12),
      speed: 0.3 + Math.random() * 0.5,
      trail: 3 + Math.floor(Math.random() * 5),
      acc: 0,
      done: false,
    });
  }

  // char buffers
  const buf = [];
  for (let r = 0; r < totalRows; r++) buf.push(new Array(COLS).fill(' '));
  // init row 0 from original
  for (let c = 0; c < COLS; c++) buf[0][c] = origPadded[c];

  // color buffer: 0=normal, 1=head(white), 2=trail(green), 3=dim
  const colors = [];
  for (let r = 0; r < totalRows; r++) colors.push(new Uint8Array(COLS));

  // phase 1: rain falls (45 ticks)
  const tickMs = 60;
  for (let t = 0; t < 45; t++) {
    for (let c = 0; c < COLS; c++) {
      const d = drops[c];
      d.acc += d.speed;
      while (d.acc >= 1) { d.y++; d.acc -= 1; }
    }

    // update buffers
    for (let c = 0; c < COLS; c++) {
      const d = drops[c];
      for (let r = 0; r < totalRows; r++) {
        const dist = d.y - r;
        if (dist === 0) {
          buf[r][c] = rc();
          colors[r][c] = 1;
        } else if (dist > 0 && dist <= d.trail) {
          if (Math.random() < 0.3) buf[r][c] = rc();
          colors[r][c] = dist <= 2 ? 2 : 3;
        } else if (dist > d.trail + 1) {
          if (r > 0) { buf[r][c] = ' '; colors[r][c] = 0; }
        }
      }
    }

    // render row 0 (response line) as HTML with colors
    renderRow(responseLine, buf[0], colors[0]);
    // render rain rows as HTML
    for (let i = 0; i < RAIN_ROWS; i++) {
      renderRow(rainEls[i], buf[i + 1], colors[i + 1]);
    }

    inputLine.scrollIntoView({block:'nearest'});
    await sleep(tickMs);
  }

  // phase 2: rain ends — streams drain down and disappear (25 ticks)
  // stop spawning new chars, let trails drain
  for (let t = 0; t < 25; t++) {
    for (let c = 0; c < COLS; c++) {
      const d = drops[c];
      d.acc += d.speed;
      while (d.acc >= 1) { d.y++; d.acc -= 1; }
      // clear cells above trail
      for (let r = 0; r < totalRows; r++) {
        const dist = d.y - r;
        if (dist > d.trail) {
          if (r === 0) {
            buf[0][c] = origPadded[c];
            colors[0][c] = 0;
          } else {
            buf[r][c] = ' ';
            colors[r][c] = 0;
          }
        } else if (dist >= 0 && dist <= d.trail) {
          if (Math.random() < 0.3) buf[r][c] = rc();
          colors[r][c] = dist === 0 ? 1 : dist <= 2 ? 2 : 3;
        }
      }
    }

    renderRow(responseLine, buf[0], colors[0]);
    for (let i = 0; i < RAIN_ROWS; i++) {
      renderRow(rainEls[i], buf[i + 1], colors[i + 1]);
    }
    await sleep(tickMs);
  }

  // cleanup: restore response, remove rain rows
  responseLine.innerHTML = origHTML;
  rainEls.forEach(el => el.remove());

  function renderRow(el, chars, clrs) {
    let html = '';
    let cur = -1;
    let seg = '';
    for (let c = 0; c < COLS; c++) {
      const cl = clrs[c];
      if (cl !== cur) {
        if (seg) html += wrapSeg(seg, cur);
        seg = ''; cur = cl;
      }
      seg += chars[c] === '<' ? '&lt;' : chars[c] === '&' ? '&amp;' : chars[c];
    }
    if (seg) html += wrapSeg(seg, cur);
    el.innerHTML = html;
  }

  function wrapSeg(s, cl) {
    if (cl === 0) return s;
    if (cl === 1) return `<span style="color:#fff">${s}</span>`;
    if (cl === 2) return `<span style="color:var(--state-live)">${s}</span>`;
    return `<span style="color:var(--state-live);opacity:.4">${s}</span>`;
  }
}

// glitch — CRT distortion
async function fxGlitch() {
  const el = document.querySelector('.terminal');
  const duration = 600;
  const start = Date.now();

  function frame() {
    const t = Date.now() - start;
    if (t > duration) {
      el.style.transform = '';
      el.style.filter = '';
      el.style.textShadow = '';
      el.style.clipPath = '';
      return;
    }
    const intensity = Math.sin(t * 0.05) * (1 - t / duration);
    const skewX = (Math.random() - 0.5) * 8 * intensity;
    const skewY = (Math.random() - 0.5) * 2 * intensity;
    const tx = (Math.random() - 0.5) * 12 * intensity;
    const r = (Math.random() - 0.5) * 4 * intensity;
    const g = (Math.random() - 0.5) * 4 * intensity;
    el.style.transform = `skew(${skewX}deg,${skewY}deg) translateX(${tx}px)`;
    el.style.textShadow = `${r}px 0 rgba(255,0,0,0.7), ${g}px 0 rgba(0,255,255,0.7)`;

    // random scanline clip
    if (Math.random() < 0.3 * Math.abs(intensity)) {
      const y1 = Math.random() * 100;
      const y2 = y1 + 2 + Math.random() * 8;
      el.style.clipPath = `polygon(0 0,100% 0,100% ${y1}%,0 ${y1}%,0 ${y2}%,100% ${y2}%,100% 100%,0 100%)`;
    } else {
      el.style.clipPath = '';
    }

    requestAnimationFrame(frame);
  }
  frame();
  await sleep(duration + 50);
}

// reboot — clear + re-run boot
async function fxReboot() {
  const el = document.querySelector('.terminal');
  el.style.transition = 'opacity .3s';
  el.style.opacity = '0';
  await sleep(400);

  // remove everything except input line
  while (term.firstChild !== inputLine) term.removeChild(term.firstChild);

  // re-insert boot sequence
  const tpl = document.getElementById('boot-template').content.cloneNode(true);
  term.insertBefore(tpl, inputLine);

  // re-bind logo animation
  const newLogo = document.getElementById('logo');
  const newMark = document.getElementById('mark');
  if (newLogo && newMark) {
    markEl = newMark;
    logoEl = newLogo;
    newLogo.addEventListener('mouseenter', () => animateMark(RUNTIME_LOOP, RUNTIME_COLORS, 200));
    newLogo.addEventListener('click', () => animateMark(RUNTIME_LOOP, RUNTIME_COLORS, 150));
  }

  el.style.opacity = '1';
  await sleep(300);
}

// ── focus management ──────────────────────────────
function focusEnd() {
  input.focus();
  const sel = window.getSelection();
  sel.selectAllChildren(input);
  sel.collapseToEnd();
}

document.addEventListener('click', e => {
  if (!input.contains(e.target) && !e.target.closest('a')) focusEnd();
});
requestAnimationFrame(focusEnd);

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
