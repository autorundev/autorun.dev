services:
  autorun-web:
    image: nginx:alpine
    container_name: autorun-web
    restart: unless-stopped
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./og.png:/usr/share/nginx/html/og.png:ro
      - ./favicon.ico:/usr/share/nginx/html/favicon.ico:ro
      - ./favicon-32.png:/usr/share/nginx/html/favicon-32.png:ro
      - ./fonts:/usr/share/nginx/html/fonts:ro
      - ./odds8:/usr/share/nginx/html/odds8:ro
      - ./s:/usr/share/nginx/html/s:ro
      - ./robots.txt:/usr/share/nginx/html/robots.txt:ro
      - ./sitemap.xml:/usr/share/nginx/html/sitemap.xml:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - autorun-api
    networks:
      - proxy

  autorun-api:
    build: ./backend
    container_name: autorun-api
    restart: unless-stopped
    env_file:
      - ../docker/.env
    environment:
      - PORT=8787
    networks:
      - proxy

networks:
  proxy:
    external: true
