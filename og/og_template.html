<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>autorun.dev — og</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-0: #0A0A0A;
    --fg-0: #E8E8E8;
    --fg-1: #A0A0A0;
    --fg-2: #606060;
    --state-core:    #7DD3FC;
    --state-live:    #4ADE80;
    --state-alert:   #FBBF24;
    --state-stop:    #F87171;
    --state-stealth: #A0A0A0;
  }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }

  body {
    background: var(--bg-0);
    color: var(--fg-0);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 500;
    letter-spacing: 0;
    padding: 80px 96px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
  }

  .statement {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    max-width: 960px;
    position: relative;
  }

  .mark {
    color: var(--state-core);
    font-size: 44px;
    font-weight: 500;
    line-height: 1.3;
    flex-shrink: 0;
  }

  .lines {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .line-primary {
    font-size: 44px;
    font-weight: 800;
    line-height: 1.3;
    color: var(--fg-0);
    letter-spacing: -0.01em;
  }

  .line-secondary {
    font-size: 44px;
    font-weight: 500;
    line-height: 1.3;
    color: var(--fg-1);
    letter-spacing: -0.01em;
  }

  /* Auto-scale for long text */
  .line-primary.small,
  .line-secondary.small   { font-size: 38px; }
  .line-primary.xsmall,
  .line-secondary.xsmall  { font-size: 32px; }
</style>
</head>
<body>

  <div class="statement">
    <span class="mark" id="mark">[*]</span>
    <div class="lines">
      <div class="line-primary" id="primary">ai-native tools &amp; products.</div>
      <div class="line-secondary" id="secondary">for people. not the other way.</div>
    </div>
  </div>

<script>
  const params = new URLSearchParams(window.location.search);

  // Text parameters
  const setText = (id, key) => {
    const v = params.get(key);
    if (v !== null) document.getElementById(id).textContent = v;
  };

  setText('primary', 'primary');
  setText('secondary', 'secondary');
  setText('mark', 'mark');

  // Auto-scale both lines together based on longest
  const primaryEl = document.getElementById('primary');
  const secondaryEl = document.getElementById('secondary');
  const maxLen = Math.max(
    primaryEl.textContent.length,
    secondaryEl.textContent.length
  );
  if (maxLen > 60) {
    primaryEl.classList.add('xsmall');
    secondaryEl.classList.add('xsmall');
  } else if (maxLen > 40) {
    primaryEl.classList.add('small');
    secondaryEl.classList.add('small');
  }

  // Mark color mapping for variants
  const markEl = document.getElementById('mark');
  const markText = markEl.textContent;
  if      (markText === '[!]')  markEl.style.color = 'var(--state-alert)';
  else if (markText === '[x]')  markEl.style.color = 'var(--state-stop)';
  else if (markText === '[+]')  markEl.style.color = 'var(--state-live)';
  else if (markText === '[:]')  markEl.style.color = 'var(--state-core)';
  // default [*] stays --state-core

  // Signal ready for headless screenshot
  document.fonts.ready.then(() => {
    document.body.setAttribute('data-ready', 'true');
  });
</script>

</body>
</html>
